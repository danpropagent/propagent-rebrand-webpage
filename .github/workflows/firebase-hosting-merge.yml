name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # required for the OIDC token exchange with Google

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/472249298599/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deploy@propagentlanding.iam.gserviceaccount.com'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting (live channel)
        run: npx firebase-tools deploy --only hosting --project propagentlanding --non-interactive
